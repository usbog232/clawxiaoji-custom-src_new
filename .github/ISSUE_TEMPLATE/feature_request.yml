name: 功能请求
description: 提出一个新功能或改进建议
title: "[功能] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请详细描述你的想法，帮助我们让 ClawPanel 变得更好。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰简洁地描述你希望添加的功能。
      placeholder: 我希望 ClawPanel 能够...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 描述这个功能会在什么场景下使用，解决什么问题。
      placeholder: |
        当我在使用 ClawPanel 时，经常需要...
        目前的做法是...
        如果有这个功能，我就可以...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 可能的实现方案
      description: 如果你有实现思路，请在这里描述。
      placeholder: |
        我认为可以通过以下方式实现:
        1. ...
        2. ...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？
      placeholder: 我也考虑过...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他相关信息，如参考链接、截图、类似产品的实现等。
      placeholder: 参考资料或额外说明...
    validations:
      required: false
